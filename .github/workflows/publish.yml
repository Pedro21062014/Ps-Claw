name: Publish to npm

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check version
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view ps-claw version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          echo "📦 Local: v$LOCAL | npm: v$REMOTE"

      - name: Configure npm
        if: steps.version.outputs.local != steps.version.outputs.remote
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken '${{ secrets.NPM_TOKEN }}'
          npm config set access public

      - name: Publish to npm
        if: steps.version.outputs.local != steps.version.outputs.remote
        run: npm publish
        timeout-minutes: 5

      - name: Success
        if: steps.version.outputs.local != steps.version.outputs.remote
        run: echo "✅ v${{ steps.version.outputs.local }} publicado com sucesso!"

      - name: Already published
        if: steps.version.outputs.local == steps.version.outputs.remote
        run: echo "✅ v${{ steps.version.outputs.local }} já existe no npm"
