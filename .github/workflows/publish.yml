name: Publish to npm

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get version info
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view ps-claw version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          echo "📦 Local: v$LOCAL | npm: v$REMOTE"

      - name: Create .npmrc with token
        if: steps.version.outputs.local != steps.version.outputs.remote
        run: |
          cat > ~/.npmrc << EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          registry=https://registry.npmjs.org/
          EOF
          chmod 600 ~/.npmrc

      - name: Publish to npm
        if: steps.version.outputs.local != steps.version.outputs.remote
        run: npm publish --access public

      - name: Already published
        if: steps.version.outputs.local == steps.version.outputs.remote
        run: echo "✅ v${{ steps.version.outputs.local }} já publicado"
