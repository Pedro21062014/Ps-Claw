name: Auto Version & Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'package.json'
      - '.github/workflows/**'

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Setup Git
        run: |
          git config user.email "pedro21062014@users.noreply.github.com"
          git config user.name "Pedro21062014"

      - name: Bump patch version
        run: npm version patch -m "chore: release v%s"

      - name: Push version bump
        run: git push origin main --follow-tags

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --ignore-scripts || true

      - name: Build
        run: node scripts/build-all.mjs || true

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
