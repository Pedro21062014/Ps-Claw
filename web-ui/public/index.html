<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS Claw</title>
  <style>
    :root {
      --bg: #212121;
      --sidebar-bg: #171717;
      --input-bg: #2f2f2f;
      --border: #3f3f3f;
      --text: #ececec;
      --text-muted: #8e8ea0;
      --accent: #10a37f;
      --accent-hover: #0d8c6d;
      --user-bubble: #2f2f2f;
      --ai-bubble: transparent;
      --danger: #e53e3e;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    #sidebar {
      width: 260px; min-width: 260px; background: var(--sidebar-bg);
      display: flex; flex-direction: column; border-right: 1px solid var(--border);
      transition: transform 0.25s; z-index: 10;
    }
    #sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    #sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    #new-chat-btn {
      width: 100%; margin: 8px 0; padding: 10px 14px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); cursor: pointer;
      font-size: 13px; text-align: left; display: flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    #new-chat-btn:hover { background: var(--input-bg); }
    #chat-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .chat-item {
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--text-muted); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; transition: background 0.15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-item:hover { background: var(--input-bg); color: var(--text); }
    .chat-item.active { background: var(--input-bg); color: var(--text); }
    .chat-item-del { opacity: 0; font-size: 11px; padding: 2px 5px; border-radius: 4px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; }
    .chat-item:hover .chat-item-del { opacity: 1; }
    .chat-item-del:hover { color: var(--danger); }
    #sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
    #status-badge {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
      color: var(--text-muted); padding: 8px; border-radius: 8px; background: var(--input-bg);
    }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; flex-shrink: 0; }
    #status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #status-dot.offline { background: var(--danger); }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    #topbar-title { font-size: 15px; font-weight: 600; }
    #model-selector {
      background: var(--input-bg); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 8px;
      font-size: 13px; cursor: pointer; outline: none;
    }

    /* MESSAGES */
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row { display: flex; gap: 12px; padding: 12px 0; max-width: 800px; margin: 0 auto; width: 100%; }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      font-weight: 700;
    }
    .avatar.ai { background: var(--accent); color: white; }
    .avatar.user { background: #6c6ef5; color: white; }
    .bubble {
      max-width: calc(100% - 50px); padding: 12px 16px; border-radius: 16px;
      font-size: 14px; line-height: 1.65; word-break: break-word;
    }
    .bubble.ai { background: var(--ai-bubble); border-radius: 0 16px 16px 16px; }
    .bubble.user { background: var(--user-bubble); border-radius: 16px 16px 0 16px; }
    .bubble pre {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px;
      padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 13px;
    }
    .bubble code { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble strong { color: #fff; }
    .typing-dots span { animation: blink 1.2s infinite; font-size: 20px; color: var(--accent); }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    #welcome {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; color: var(--text-muted); padding: 40px;
    }
    #welcome h2 { font-size: 28px; color: var(--text); }
    #welcome p { font-size: 15px; text-align: center; max-width: 440px; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      padding: 8px 14px; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s;
      color: var(--text);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* INPUT */
    #input-area { padding: 16px 20px 20px; background: var(--bg); }
    #input-box {
      max-width: 800px; margin: 0 auto;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; align-items: flex-end; gap: 8px;
      padding: 12px 14px; transition: border-color 0.15s;
    }
    #input-box:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none; max-height: 200px;
      line-height: 1.5; font-family: inherit;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 34px; height: 34px; border-radius: 8px; border: none;
      background: var(--accent); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }

    /* SETTINGS MODAL */
    #settings-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; align-items: center; justify-content: center;
    }
    #settings-overlay.open { display: flex; }
    #settings-modal {
      background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; width: 440px; max-width: 95vw;
    }
    #settings-modal h2 { margin-bottom: 20px; font-size: 18px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 9px 12px; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 14px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-primary { background: var(--accent); color: white; }
    .btn:hover { opacity: 0.85; }

    @media (max-width: 640px) {
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #menu-btn { display: flex; }
    }
    #menu-btn {
      display: none; background: transparent; border: none; color: var(--text);
      font-size: 20px; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🦞 PS Claw</h1>
    <button onclick="openSettings()" title="Configurações" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;">⚙️</button>
  </div>
  <div style="padding: 8px 8px 4px;">
    <button id="new-chat-btn" onclick="newChat()">
      <span>✏️</span> Novo Chat
    </button>
  </div>
  <div id="chat-list"></div>
  <div id="sidebar-footer">
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">Verificando gateway...</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <span id="topbar-title">PS Claw</span>
    </div>
    <select id="model-selector">
      <option value="">Modelo padrão</option>
      <option value="claude-opus-4-5">Claude Opus 4.5</option>
      <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o mini</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
    </select>
  </div>

  <div id="messages">
    <div id="welcome">
      <div style="font-size:56px;">🦞</div>
      <h2>PS Claw</h2>
      <p>Agente de IA autônomo leve e poderoso. Configure sua chave de API e comece a conversar.</p>
      <div class="welcome-chips">
        <div class="chip" onclick="sendQuick('Olá! O que você consegue fazer?')">O que você consegue fazer?</div>
        <div class="chip" onclick="sendQuick('Me ajude a escrever um script Python')">Escrever código</div>
        <div class="chip" onclick="sendQuick('Pesquise na web sobre IA em 2025')">Pesquisar na web</div>
        <div class="chip" onclick="sendQuick('Explique como funciona o PS Claw')">Sobre o PS Claw</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-box">
      <textarea id="msg-input" placeholder="Escreva uma mensagem..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Enviar (Enter)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-overlay" onclick="closeSettings(event)">
  <div id="settings-modal">
    <h2>⚙️ Configurações</h2>
    <div class="field">
      <label>URL do Gateway PS Claw</label>
      <input type="text" id="cfg-gateway" placeholder="http://localhost:18789" />
    </div>
    <div class="field">
      <label>Token do Gateway (opcional)</label>
      <input type="password" id="cfg-token" placeholder="Seu OPENCLAW_GATEWAY_TOKEN" />
    </div>
    <div class="field">
      <label>Nome de exibição</label>
      <input type="text" id="cfg-name" placeholder="Você" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSettings()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ─── Estado ───────────────────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('ps-claw-sessions') || '[]');
let currentSession = null;
let isTyping = false;
let cfg = JSON.parse(localStorage.getItem('ps-claw-cfg') || '{}');
cfg.gateway = cfg.gateway || 'http://localhost:3000/gateway';
cfg.token   = cfg.token   || '';
cfg.name    = cfg.name    || 'Você';

// ─── Inicialização ────────────────────────────────────────────────────────
renderChatList();
checkGateway();
setInterval(checkGateway, 15000);

// ─── Gateway ──────────────────────────────────────────────────────────────
async function checkGateway() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  try {
    const r = await fetch(cfg.gateway + '/health', {
      headers: cfg.token ? { Authorization: 'Bearer ' + cfg.token } : {},
      signal: AbortSignal.timeout(3000)
    });
    if (r.ok) {
      dot.className = 'online'; text.textContent = 'Gateway online';
    } else {
      dot.className = 'offline'; text.textContent = 'Gateway com erro';
    }
  } catch {
    dot.className = 'offline'; text.textContent = 'Gateway offline';
  }
}

// ─── Chat ─────────────────────────────────────────────────────────────────
function newChat() {
  const id = Date.now().toString();
  const session = { id, title: 'Nova conversa', messages: [], created: Date.now() };
  sessions.unshift(session);
  saveSessions();
  selectChat(id);
}

function selectChat(id) {
  currentSession = sessions.find(s => s.id === id);
  if (!currentSession) return;
  renderChatList();
  renderMessages();
}

function deleteChat(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentSession?.id === id) { currentSession = null; renderMessages(); }
  renderChatList();
}

function saveSessions() {
  localStorage.setItem('ps-claw-sessions', JSON.stringify(sessions));
}

// ─── Render ───────────────────────────────────────────────────────────────
function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = sessions.map(s => `
    <div class="chat-item ${s.id === currentSession?.id ? 'active' : ''}" onclick="selectChat('${s.id}')">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(s.title)}</span>
      <button class="chat-item-del" onclick="deleteChat('${s.id}', event)" title="Excluir">✕</button>
    </div>
  `).join('');
}

function renderMessages() {
  const box = document.getElementById('messages');
  if (!currentSession || currentSession.messages.length === 0) {
    box.innerHTML = `<div id="welcome">
      <div style="font-size:56px;">🦞</div>
      <h2>PS Claw</h2>
      <p>Agente de IA autônomo. Configure sua chave de API e comece a conversar.</p>
      <div class="welcome-chips">
        <div class="chip" onclick="sendQuick('Olá! O que você consegue fazer?')">O que você consegue fazer?</div>
        <div class="chip" onclick="sendQuick('Me ajude a escrever um script Python')">Escrever código</div>
        <div class="chip" onclick="sendQuick('Pesquise na web sobre IA em 2025')">Pesquisar na web</div>
        <div class="chip" onclick="sendQuick('Explique como funciona o PS Claw')">Sobre o PS Claw</div>
      </div>
    </div>`;
    return;
  }
  box.innerHTML = currentSession.messages.map(m => renderMsg(m)).join('');
  box.scrollTop = box.scrollHeight;
}

function renderMsg(m) {
  const isUser = m.role === 'user';
  return `
    <div class="msg-row ${isUser ? 'user' : 'ai'}">
      <div class="avatar ${isUser ? 'user' : 'ai'}">${isUser ? (cfg.name[0]||'V').toUpperCase() : '🦞'}</div>
      <div class="bubble ${isUser ? 'user' : 'ai'}">${formatText(m.content)}</div>
    </div>`;
}

function addTypingIndicator() {
  const box = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'typing-row';
  el.className = 'msg-row ai';
  el.innerHTML = `<div class="avatar ai">🦞</div><div class="bubble ai"><div class="typing-dots"><span>•</span><span>•</span><span>•</span></div></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function removeTypingIndicator() {
  document.getElementById('typing-row')?.remove();
}

// ─── Envio ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || isTyping) return;
  if (!currentSession) newChat();

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isTyping = true;

  document.getElementById('welcome')?.remove();

  currentSession.messages.push({ role: 'user', content: text });
  if (currentSession.messages.length === 1) {
    currentSession.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
    renderChatList();
  }
  saveSessions();
  renderMessages();
  addTypingIndicator();

  try {
    const model = document.getElementById('model-selector').value;
    const body = {
      text,
      ...(model && { model }),
      history: currentSession.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
    };

    const resp = await fetch(cfg.gateway + '/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(cfg.token && { Authorization: 'Bearer ' + cfg.token })
      },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(60000)
    });

    removeTypingIndicator();

    let replyText;
    if (resp.ok) {
      const data = await resp.json();
      replyText = data.reply || data.text || data.content || data.message || JSON.stringify(data, null, 2);
    } else {
      replyText = await tryFallbackChat(text);
    }

    currentSession.messages.push({ role: 'assistant', content: replyText });
    saveSessions();
    renderMessages();

  } catch (err) {
    removeTypingIndicator();
    const fallback = await tryFallbackChat(text);
    currentSession.messages.push({ role: 'assistant', content: fallback });
    saveSessions();
    renderMessages();
  }

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
}

async function tryFallbackChat(text) {
  const endpoints = ['/v1/chat', '/api/chat', '/message'];
  for (const ep of endpoints) {
    try {
      const r = await fetch(cfg.gateway + ep, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(cfg.token && { Authorization: 'Bearer ' + cfg.token }) },
        body: JSON.stringify({ message: text, messages: [{ role: 'user', content: text }] }),
        signal: AbortSignal.timeout(10000)
      });
      if (r.ok) {
        const d = await r.json();
        return d.reply || d.text || d.content || d.message || JSON.stringify(d, null, 2);
      }
    } catch {}
  }
  return `⚠️ **Gateway offline ou configuração necessária**\n\nO PS Claw não está respondendo. Verifique:\n\n1. Execute o PS Claw: \`node openclaw.mjs\`\n2. Configure a URL do gateway em ⚙️ Configurações\n3. Adicione seu token se necessário\n\nGateway esperado em: \`${cfg.gateway}\``;
}

function sendQuick(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// ─── Utils ────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatText(text) {
  if (!text) return '';
  let t = escHtml(text);
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="language-${lang}">${code.trim()}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3 style="margin:8px 0 4px;font-size:15px;">$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2 style="margin:10px 0 6px;font-size:17px;">$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1 style="margin:12px 0 8px;font-size:20px;">$1</h1>');
  t = t.replace(/^- (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  t = t.split('\n\n').map(p => p.startsWith('<') ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('\n');
  return t;
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── Settings ─────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('cfg-gateway').value = cfg.gateway;
  document.getElementById('cfg-token').value   = cfg.token;
  document.getElementById('cfg-name').value    = cfg.name;
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(e) {
  if (!e || e.target === document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').classList.remove('open');
}
function saveSettings() {
  cfg.gateway = document.getElementById('cfg-gateway').value.trim() || 'http://localhost:3000/gateway';
  cfg.token   = document.getElementById('cfg-token').value.trim();
  cfg.name    = document.getElementById('cfg-name').value.trim() || 'Você';
  localStorage.setItem('ps-claw-cfg', JSON.stringify(cfg));
  document.getElementById('settings-overlay').classList.remove('open');
  checkGateway();
}
</script>
</body>
</html>
